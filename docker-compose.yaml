services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: bao
      POSTGRES_PASSWORD: bao
      POSTGRES_DB: bao
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bao"]
      interval: 5s
      timeout: 3s
      retries: 5
volumes:
  pgdata:
